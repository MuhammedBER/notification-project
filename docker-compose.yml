version: '3.8'

services:
  # PostgreSQL Database Container
  db:
    image: postgres:17-alpine
    container_name: notification-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot Backend Container
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notification-backend
    ports:
      - "8080:8080"
    environment:
      # Connects using the internal Docker network name "db"
      - DATABASE_URL=${DATABASE_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  # React/Vite Frontend Container (served via 'serve' on port 3000)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Passes the environment variable to the build process
        - VITE_API_URL=${VITE_API_URL}
    container_name: notification-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  # Persistent volume for the database so data isn't lost on restart
  postgres_data:
