version: '3.8'

services:
  # PostgreSQL Database Container
  db:
    image: postgres:17-alpine
    container_name: notification-db
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot Backend Container
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notification-backend
    ports:
      - "8080:8080"
    environment:
      # Connects using the internal Docker network name "db"
      - DATABASE_URL=jdbc:postgresql://db:5432/notifications
      - DB_USER=postgres
      - DB_PASSWORD=postgres_password
    depends_on:
      db:
        condition: service_healthy

  # React/Vite Frontend Container (served via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notification-frontend
    ports:
      - "3000:80" # Maps your computer's port 3000 to the container's port 80
    depends_on:
      - backend

volumes:
  # Persistent volume for the database so data isn't lost on restart
  postgres_data:
