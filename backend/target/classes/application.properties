spring.application.name=notification-backend

# Server Configuration
server.port=8080

# MySQL Database Configuration
# NOTE: Ensure you have created a database named "notifications" in your MySQL server.
spring.datasource.url=jdbc:mysql://localhost:3306/notifications?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS configuration for WebSockets is handled in WebSocketConfig
